server:
  port: 8087

spring:
  application:
    name: rh-chat-service
  datasource:
    url: jdbc:mysql://localhost:3306/DataRh?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Africa/Casablanca&characterEncoding=utf8
    username: root
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

eureka:
  instance:
    hostname: localhost
    prefer-ip-address: false
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

app:
  uploads:
    dir: ./uploads/chat
  chat:
    max-file-size-bytes: 10485760
    allowed-extensions: pdf,png,jpg,jpeg,doc,docx,xls,xlsx

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
